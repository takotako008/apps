<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>123.orz - Welcome to the Archive</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: "MS PGothic", "Osaka", sans-serif;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border: 1px solid #ccc;
            padding: 20px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            color: #0000ff;
            margin-bottom: 10px;
        }
        .description {
            font-size: 14px;
            margin-bottom: 20px;
            border-bottom: 1px dotted #999;
            padding-bottom: 10px;
        }
        .menu {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .menu a {
            text-decoration: none;
            color: #0000ee;
            font-weight: bold;
        }
        .menu a:hover {
            text-decoration: underline;
        }
        .upload-section {
            background-color: #e9e9e9;
            padding: 15px;
            border: 1px inset #fff;
            margin-bottom: 20px;
        }
        input[type="file"] {
            margin: 10px 0;
        }
        .footer {
            font-size: 12px;
            color: #666;
            margin-top: 30px;
        }
        .aa {
            font-family: "MS PGothic", "Mona", "IPAMonaPGothic", sans-serif;
            font-size: 16px;
            line-height: 1;
            white-space: pre;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>123.orz</h1>
    
    <div class="description">
        ここは123.orzの仮ポータルサイトです。
    </div>

    <div class="aa">
 ＿|￣|○ 
    </div>

    <div class="menu">
        <a href="#">Uploader</a>
        <a href="#">Short URL</a>
        <a href="#">BBS</a>
        <a href="#">Contact</a>
    </div>

    <div class="upload-section">
        <strong>ファイルアップロード</strong><br>
        <form action="#" method="post" enctype="multipart/form-data">
            <input type="file" name="upfile"><br>
            <input type="submit" value="アップロード実行">
        </form>
        <p style="font-size: 11px;">※最大サイズ：10MBまで</p>
    </div>

    <div class="footer">
        &copy; 2000-2026 123.orz Project. All rights reserved.
    </div>
</div>

</body>
</html>
